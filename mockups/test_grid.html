<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeckWarz - Choose Your Nation</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        .arena-container {
            max-width: 1400px;
        }

        .deck-grid {
            gap: 40px 30px;
        }
    </style>
</head>

<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <main class="arena-container">
        <header>
            <h1 class="neon-title">SELECT YOUR DECK</h1>
            <p class="subtitle">Draft a squad of 15 current T20 World Cup stars to do battle</p>
        </header>

        <div class="deck-grid">

            <!-- India -->
            <div class="deck-wrapper" style="--deck-color: #0000FF;">
                <div class="deck-card type-flip">
                    <div class="card-inner-flip">
                        <div class="flip-front">
                            <img src="static/images/decks/india_start.png" class="frame">
                        </div>
                        <div class="flip-back">
                            <img src="static/images/decks/india_end.png" class="frame">
                            <div class="neon-border-pulse"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Australia -->
            <div class="deck-wrapper" style="--deck-color: #FFCD00;">
                <div class="deck-card type-flip">

                </div>

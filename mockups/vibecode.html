<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeckWarz - Choose Your Nation</title>
    <link rel="stylesheet" href="static/css/vibecode.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-effects">
        <div class="glow-orb orb-center"></div>
    </div>

    <div id="ui-layer">
        <header>
            <h1 class="neon-title">SELECT YOUR DECK</h1>
            <p class="subtitle">Draft a squad of 15 current T20 World Cup stars to do battle</p>
        </header>

        <div class="nav-controls">
            <button class="nav-btn" id="btn-prev">&#8592;</button>
            <div class="team-indicator">
                <h2 id="active-team-name">LOADING...</h2>
                <button id="select-btn">DRAFT DECK</button>
            </div>
            <button class="nav-btn" id="btn-next">&#8594;</button>
        </div>

        <div class="scroll-instruction">
            &#8595; Scroll Down to Open Deck &#8595;
        </div>
    </div>

    <!-- The VibeCode Magic Area -->
    <div id="canvas-container">
        <canvas id="vibe-canvas"></canvas>
    </div>

    <script src="static/js/vibecode.js"></script>
</body>

</html>

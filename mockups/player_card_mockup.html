<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Card Mockup | DeckWarz</title>
    <!-- Use external google fonts for Outfit and Orbitron -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&family=Orbitron:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --card-w: 300px;
            --card-h: 533px;
            /* 9:16 aspect ratio roughly */
            --team-color: #00a8ff;
            /* Defaulting to India's Blue */
            --accent-glow: rgba(0, 168, 255, 0.6);
        }

        body {
            background-color: var(--bg-primary);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, #151828, #0a0a0f 80%);
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: -1;
        }

        /* 3D Scene setup */
        .scene {
            width: var(--card-w);
            height: var(--card-h);
            perspective: 1200px;
            cursor: pointer;
        }

        /* The Card Container that holds front and back */
        .player-card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* Flip Action on Hover or Click */
        .scene:hover .player-card {
            transform: rotateY(180deg) scale(1.05);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(145deg, rgba(30, 30, 40, 0.9), rgba(15, 15, 20, 0.9));
        }

        .card-front {
            /* Basic styling for front */
            display: flex;
            flex-direction: column;
        }

        .card-back {
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, var(--accent-glow) 0%, #0a0a0f 70%);
            border-color: var(--team-color);
            box-shadow: inset 0 0 30px var(--accent-glow);
        }

        /* Front specific designs */
        .player-image-wrapper {
            height: 55%;
            width: 100%;
            position: relative;
            background: linear-gradient(to bottom, transparent, #0a0a0f), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><rect fill="%232a2d3e" width="300" height="300"/></svg>') center/cover;
            /* In a real scenario, this would be the actual player cutout image over a stadium background */
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .player-placeholder {
            width: 80%;
            height: 90%;
            background: linear-gradient(to top, var(--team-color), transparent);
            mask-image: linear-gradient(to top, black 50%, transparent);
            -webkit-mask-image: linear-gradient(to top, black 50%, transparent);
            border-radius: 50% 50% 0 0;
            opacity: 0.5;
        }

        .team-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: var(--team-color);
            border-radius: 50%;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 14px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .player-info {
            height: 45%;
            padding: 15px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to top, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0.4));
            position: relative;
            z-index: 2;
        }

        .role-tag {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ccc;
            margin-bottom: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .player-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0 0 5px 0;
            line-height: 1.1;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--accent-glow);
            color: #fff;
        }

        .player-country {
            font-size: 0.9rem;
            color: var(--team-color);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #8b8ea5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }

        .accent-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--team-color);
            box-shadow: 0 -2px 15px var(--accent-glow);
        }

        /* Back specific designs */
        .back-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px var(--team-color);
            margin-bottom: 20px;
            transform: rotate(-15deg);
        }

        .back-pattern {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 0;
            pointer-events: none;
        }

        /* Ambient Glow effect around the entire card */
        .ambient-glow {
            position: absolute;
            inset: -20px;
            background: var(--team-color);
            filter: blur(40px);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: -1;
            pointer-events: none;
        }

        .scene:hover .ambient-glow {
            opacity: 0.4;
        }
    </style>
</head>

<body>

    <div class="scene">
        <div class="ambient-glow"></div>
        <div class="player-card">

            <!-- Front of Card -->
            <div class="card-face card-front">
                <div class="player-image-wrapper">
                    <!-- Placeholder for player render -->
                    <div class="player-placeholder"></div>
                    <div class="team-badge">IND</div>
                </div>

                <div class="player-info">
                    <span class="role-tag">Top Order Batter</span>
                    <h2 class="player-name">Virat<br>Kohli</h2>
                    <div class="player-country">India</div>

                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-label">Matches</span>
                            <span class="stat-value">115</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Runs</span>
                            <span class="stat-value">4008</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Strike Rate</span>
                            <span class="stat-value">137.96</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Average</span>
                            <span class="stat-value">52.73</span>
                        </div>
                    </div>
                </div>
                <div class="accent-bar"></div>
            </div>

            <!-- Back of Card -->
            <div class="card-face card-back">
                <div class="back-pattern"></div>
                <div class="back-logo">DECK<br>WARZ</div>
                <div style="font-size: 0.8rem; letter-spacing: 3px; color: var(--team-color); z-index: 1;">LEGENDARY
                </div>
            </div>

        </div>
    </div>

        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeckWarz - Choose Your Nation</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Orbitron:wght@700;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Overlay that blurs the background but leaves the top (logo area) clear -->
    <div class="bg-blur-overlay"></div>

    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <main class="arena-container">
        <header>
            <img src="Frames/Background/Name.png" alt="DECK WARZ - SELECT YOUR NATION" class="main-logo">
        </header>

        <div class="deck-grid">

            <!-- India -->
            <div class="deck-wrapper" style="--deck-color: #00a8ff;">
                <div class="deck-card">
                    <img src="Frames/IND start.png" class="frame start-frame">
                    <img src="Frames/IND end.png" class="frame end-frame">
                    <div class="interactive-glow"></div>
                </div>
                <h3 class="country-label">India</h3>
            </div>

            <!-- Australia -->
            <div class="deck-wrapper" style="--deck-color: #FFCD00;">
                <div class="deck-card">
                    <img src="Frames/AUS start.png" class="frame start-frame">
                    <img src="Frames/AUS end.png" class="frame end-frame">
                    <div class="interactive-glow"></div>
                </div>
                <h3 class="country-label">Australia</h3>
            </div>

            <!-- England -->
            <div class="deck-wrapper" style="--deck-color: #ff4757;">
                <div class="deck-card">
                    <img src="Frames/ENG start.png" class="frame start-frame">
                    <img src="Frames/ENG end.png" class="frame end-frame">
                    <div class="interactive-glow"></div>
                </div>
                <h3 class="country-label">England</h3>
            </div>

            <!-- Pakistan -->
            <div class="deck-wrapper" style="--deck-color: #2ed573;">
                <div class="deck-card">
                    <img src="Frames/PCB start.png" class="frame start-frame">
                    <img src="Frames/PCB end.png" class="frame end-frame">
                    <div class="interactive-glow"></div>
                </div>
                <h3 class="country-label">Pakistan</h3>
            </div>

            <!-- South Africa -->
            <div class="deck-wrapper" style="--deck-color: #2bad60;">
                <div class="deck-card">
                    <img src="Frames/SA start.png" class="frame start-frame">
                    <img src="Frames/SA end.png" class="frame end-frame">
                    <div class="interactive-glow"></div>
                </div>
                <h3 class="country-label">South Africa</h3>
            </div>

            <!-- New Zealand -->
            <div class="deck-wrapper" style="--deck-color: #dfdfdf;">
                <div class="deck-card">
                    <img src="Frames/NZ start.png" class="frame start-frame">
                    <img src="Frames/NZ end.png" class="frame end-frame">
                    <div class="interactive-glow"></div>
                </div>
                <h3 class="country-label">New Zealand</h3>
            </div>

            <!-- Sri Lanka -->
            <div class="deck-wrapper" style="--deck-color: #1e90ff;">
                <div class="deck-card">
                    <img src="Frames/SL start.png" class="frame start-frame">
                    <img src="Frames/SL end.png" class="frame end-frame">
                    <div class="interactive-glow"></div>
                </div>
                <h3 class="country-label">Sri Lanka</h3>
            </div>

            <!-- West Indies -->
            <div class="deck-wrapper" style="--deck-color: #ff6b81;">
                <div class="deck-card">
                    <img src="Frames/WI start.png" class="frame start-frame">
                    <img src="Frames/WI end.png" class="frame end-frame">
                    <div class="interactive-glow"></div>
                </div>
                <h3 class="country-label">West Indies</h3>
            </div>

            <!-- Bangladesh -->
            <div class="deck-wrapper" style="--deck-color: #2ed573;">
                <div class="deck-card">
                    <img src="Frames/BNG start.png" class="frame start-frame">
                    <img src="Frames/BNG end.png" class="frame end-frame">
                    <div class="interactive-glow"></div>
                </div>
                <h3 class="country-label">Bangladesh</h3>
            </div>

            <!-- Afghanistan -->
            <div class="deck-wrapper" style="--deck-color: #5352ed;">
                <div class="deck-card">
                    <img src="Frames/AFG start.png" class="frame start-frame">
                    <img src="Frames/AFG end.png" class="frame end-frame">
                    <div class="interactive-glow"></div>
                </div>
                <h3 class="country-label">Afghanistan</h3>
            </div>

            <!-- Ireland -->
            <div class="deck-wrapper" style="--deck-color: #7bed9f;">
                <div class="deck-card">
                    <img src="Frames/IRE start.png" class="frame start-frame">
                    <img src="Frames/IRE end.png" class="frame end-frame">
                    <div class="interactive-glow"></div>
                </div>
                <h3 class="country-label">Ireland</h3>
            </div>

            <!-- Zimbabwe -->
            <div class="deck-wrapper" style="--deck-color: #ff4757;">
                <div class="deck-card">
                    <img src="Frames/ZIM start.png" class="frame start-frame">
                    <img src="Frames/ZIM end.png" class="frame end-frame">
                    <div class="interactive-glow"></div>
                </div>
                <h3 class="country-label">Zimbabwe</h3>
            </div>

        </div>

        <!-- Action Bar for Start War Button -->
        <div class="action-bar hidden" id="action-bar">
            <div class="selection-counter">
                <span id="selected-count">0</span> / 5 NATIONS SELECTED
            </div>
            <button id="start-war-btn" class="neon-button">START WAR</button>
        </div>
    </main>

    <script src="static/js/deck_selection.js"></script>
</body>

</html>
